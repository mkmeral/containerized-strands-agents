<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Containerized Strands Agents</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        /* ═══════════════════════════════════════════════════════════════
           RESET & VARIABLES — Matching presentation theme
           ═══════════════════════════════════════════════════════════════ */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:           #0a0e1a;
            --bg-card:      #111827;
            --bg-code:      #0d1117;
            --bg-input:     #0f1623;
            --border:       #1e293b;
            --border-focus: #6366f1;
            --text:         #e2e8f0;
            --text-dim:     #94a3b8;
            --text-muted:   #64748b;
            --accent:       #6366f1;
            --accent-glow:  #818cf8;
            --accent-bg:    rgba(99, 102, 241, 0.1);
            --accent-bg2:   rgba(99, 102, 241, 0.15);
            --teal:         #2dd4bf;
            --teal-bg:      rgba(45, 212, 191, 0.1);
            --amber:        #fbbf24;
            --amber-bg:     rgba(251, 191, 36, 0.1);
            --rose:         #fb7185;
            --rose-bg:      rgba(251, 113, 133, 0.1);
            --sky:          #38bdf8;
            --green:        #4ade80;
            --green-bg:     rgba(74, 222, 128, 0.1);
            --purple:       #a78bfa;
            --orange:       #fb923c;

            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;

            --sidebar-width: 320px;
            --radius: 12px;
            --radius-sm: 8px;
            --radius-xs: 6px;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-sans);
            -webkit-font-smoothing: antialiased;
        }

        body {
            display: flex;
        }

        /* ═══════════════════════════════════════════════════════════════
           SCROLLBAR
           ═══════════════════════════════════════════════════════════════ */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        /* ═══════════════════════════════════════════════════════════════
           SIDEBAR
           ═══════════════════════════════════════════════════════════════ */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-card);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }

        .sidebar-brand svg {
            width: 24px;
            height: 24px;
            flex-shrink: 0;
        }

        .sidebar-brand h1 {
            font-size: 16px;
            font-weight: 700;
            background: linear-gradient(135deg, #00FF77, #00cc5f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-controls {
            display: flex;
            gap: 8px;
        }

        .btn-icon {
            background: rgba(99, 102, 241, 0.08);
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 7px 12px;
            border-radius: var(--radius-xs);
            cursor: pointer;
            font-size: 12px;
            font-family: var(--font-sans);
            font-weight: 500;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .btn-icon:hover {
            background: var(--accent-bg);
            border-color: var(--accent);
            color: var(--accent-glow);
        }

        .filter-controls {
            margin-top: 12px;
        }

        .filter-checkbox {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: var(--text-dim);
            cursor: pointer;
        }

        .filter-checkbox input[type="checkbox"] {
            accent-color: var(--accent);
        }

        /* Sidebar Action Buttons */
        .sidebar-actions {
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .new-agent-btn {
            background: linear-gradient(135deg, var(--accent), #4f46e5);
            color: white;
            border: none;
            padding: 11px 16px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            font-family: var(--font-sans);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(99, 102, 241, 0.25);
        }

        .new-agent-btn:hover {
            box-shadow: 0 4px 16px rgba(99, 102, 241, 0.4);
            transform: translateY(-1px);
        }

        .new-agent-btn::before {
            content: '+';
            font-size: 16px;
            font-weight: 700;
        }

        .inbox-btn {
            background: var(--bg);
            color: var(--text-dim);
            border: 1px solid var(--border);
            padding: 10px 16px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            font-family: var(--font-sans);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .inbox-btn:hover {
            background: var(--accent-bg);
            border-color: var(--accent);
            color: var(--text);
        }

        .inbox-btn.active {
            background: var(--accent-bg2);
            border-color: var(--accent);
            color: var(--accent-glow);
        }

        .unread-count {
            display: inline-block;
            background: var(--rose);
            color: white;
            font-size: 10px;
            font-weight: 700;
            padding: 1px 6px;
            border-radius: 10px;
            line-height: 1.4;
        }

        /* Agent List */
        .agents-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 12px;
        }

        .agent-item {
            padding: 14px;
            margin-bottom: 6px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.2s;
        }

        .agent-item:hover {
            border-color: var(--accent);
            background: rgba(99, 102, 241, 0.04);
        }

        .agent-item.active {
            background: var(--accent-bg2);
            border-color: var(--accent);
            box-shadow: 0 0 16px rgba(99, 102, 241, 0.15);
        }

        .agent-id {
            font-weight: 600;
            font-size: 14px;
            color: var(--text);
        }

        .agent-item.active .agent-id {
            color: var(--accent-glow);
        }

        .agent-description {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 4px;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .agent-status {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .agent-meta {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 6px;
            display: flex;
            flex-direction: column;
            gap: 3px;
            font-family: var(--font-mono);
        }

        .agent-meta-row {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .copy-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 2px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 10px;
            font-family: var(--font-sans);
            transition: all 0.2s;
        }

        .copy-btn:hover {
            background: var(--accent-bg);
            border-color: var(--accent);
            color: var(--accent-glow);
        }

        .copy-btn.copied {
            background: var(--green-bg);
            border-color: var(--green);
            color: var(--green);
        }

        .unread-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            margin-right: 4px;
            box-shadow: 0 0 6px rgba(99, 102, 241, 0.5);
            flex-shrink: 0;
        }

        /* Status Badges */
        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 2px 8px;
            border-radius: 999px;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.03em;
            text-transform: uppercase;
        }

        .status-running {
            background: var(--green-bg);
            color: var(--green);
        }

        .status-stopped {
            background: rgba(100, 116, 139, 0.15);
            color: var(--text-muted);
        }

        .status-error {
            background: var(--rose-bg);
            color: var(--rose);
        }

        .status-processing {
            background: var(--amber-bg);
            color: var(--amber);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        /* ═══════════════════════════════════════════════════════════════
           MAIN CONTENT
           ═══════════════════════════════════════════════════════════════ */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        /* ═══════════════════════════════════════════════════════════════
           INBOX VIEW
           ═══════════════════════════════════════════════════════════════ */
        .inbox-view {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .inbox-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-card);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .inbox-header h2 {
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
        }

        .inbox-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            background: var(--bg);
        }

        .inbox-item {
            padding: 14px 16px;
            margin-bottom: 8px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.2s;
        }

        .inbox-item:hover {
            border-color: var(--accent);
            background: rgba(99, 102, 241, 0.04);
        }

        .inbox-item.unread {
            border-left: 3px solid var(--accent);
            background: rgba(99, 102, 241, 0.06);
        }

        .inbox-item-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 6px;
        }

        .inbox-item-agent {
            display: flex;
            align-items: center;
            font-weight: 600;
            font-size: 14px;
            color: var(--text);
            gap: 6px;
        }

        .inbox-item.unread .inbox-item-agent {
            color: var(--accent-glow);
        }

        .inbox-item-time {
            font-size: 11px;
            color: var(--text-muted);
            font-family: var(--font-mono);
        }

        .inbox-item-preview {
            font-size: 13px;
            color: var(--text-dim);
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .inbox-empty {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-dim);
        }

        .inbox-empty-icon {
            font-size: 48px;
            margin-bottom: 12px;
            opacity: 0.6;
        }

        /* ═══════════════════════════════════════════════════════════════
           NO AGENT PLACEHOLDER
           ═══════════════════════════════════════════════════════════════ */
        .no-agent {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-dim);
            gap: 12px;
        }

        .no-agent-icon {
            font-size: 48px;
            opacity: 0.3;
        }

        .no-agent-text {
            font-size: 16px;
            font-weight: 500;
        }

        /* ═══════════════════════════════════════════════════════════════
           CHAT CONTAINER
           ═══════════════════════════════════════════════════════════════ */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .chat-header {
            padding: 18px 24px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-card);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-header h2 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
        }

        .chat-header .agent-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 3px 10px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 600;
            background: var(--teal-bg);
            color: var(--teal);
        }

        /* Messages Area */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            background: var(--bg);
        }

        .message {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }

        .message-header {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            margin-bottom: 6px;
            color: var(--text-muted);
        }

        .message.user .message-header {
            color: var(--accent-glow);
        }

        .message.assistant .message-header {
            color: var(--teal);
        }

        .message-content {
            background: var(--bg-card);
            padding: 16px 20px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            white-space: pre-wrap;
            font-family: var(--font-sans);
            line-height: 1.6;
            font-size: 14px;
            color: var(--text);
        }

        .message.user .message-content {
            background: var(--accent-bg2);
            border-color: var(--accent);
            color: var(--text);
        }

        /* Tool messages */
        .message.tool_use,
        .message.tool_result {
            margin-bottom: 4px;
        }

        .message.tool_use .message-content,
        .message.tool_result .message-content {
            background: transparent;
            border: none;
            padding: 3px 0;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .message.tool_use .message-header,
        .message.tool_result .message-header {
            display: none;
        }

        .tool-icon {
            font-size: 12px;
            color: var(--text-muted);
        }

        .tool-badge {
            display: inline-flex;
            align-items: center;
            padding: 3px 10px;
            border-radius: var(--radius-xs);
            font-size: 11px;
            font-weight: 600;
            font-family: var(--font-mono);
        }

        .tool-badge.tool-name {
            background: var(--accent-bg);
            color: var(--accent-glow);
            border: 1px solid rgba(99, 102, 241, 0.2);
        }

        .tool-badge.status-success {
            background: var(--green-bg);
            color: var(--green);
        }

        .tool-badge.status-error {
            background: var(--rose-bg);
            color: var(--rose);
        }

        .tool-badge.status-unknown {
            background: rgba(100, 116, 139, 0.1);
            color: var(--text-muted);
        }

        .tool-params {
            font-size: 11px;
            color: var(--text-muted);
            font-family: var(--font-mono);
            max-width: 500px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* ═══════════════════════════════════════════════════════════════
           INPUT AREA
           ═══════════════════════════════════════════════════════════════ */
        .input-area {
            padding: 16px 24px;
            border-top: 1px solid var(--border);
            background: var(--bg-card);
        }

        .input-row {
            display: flex;
            gap: 10px;
        }

        .message-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: var(--font-sans);
            font-size: 14px;
            resize: none;
            min-height: 56px;
            background: var(--bg-input);
            color: var(--text);
            transition: all 0.2s;
            line-height: 1.5;
        }

        .message-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }

        .message-input::placeholder {
            color: var(--text-muted);
        }

        .send-btn {
            background: linear-gradient(135deg, var(--accent), #4f46e5);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            font-family: var(--font-sans);
            height: fit-content;
            align-self: flex-end;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(99, 102, 241, 0.25);
        }

        .send-btn:hover {
            box-shadow: 0 4px 16px rgba(99, 102, 241, 0.4);
            transform: translateY(-1px);
        }

        .send-btn:disabled {
            background: var(--border);
            color: var(--text-muted);
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        .options-row {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .option-input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius-xs);
            font-size: 12px;
            font-family: var(--font-mono);
            background: var(--bg-input);
            color: var(--text);
            transition: all 0.2s;
        }

        .option-input::placeholder {
            color: var(--text-muted);
        }

        .option-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.1);
        }

        /* ═══════════════════════════════════════════════════════════════
           NEW AGENT FORM
           ═══════════════════════════════════════════════════════════════ */
        .new-agent-form {
            padding: 32px;
            display: flex;
            flex-direction: column;
            height: 100%;
            background: var(--bg);
            overflow-y: auto;
        }

        .form-header {
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 24px;
        }

        .form-header h2 {
            font-size: 22px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 8px;
        }

        .form-header p {
            color: var(--text-dim);
            font-size: 14px;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 6px;
            color: var(--text);
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: var(--font-sans);
            font-size: 14px;
            background: var(--bg-card);
            color: var(--text);
            transition: all 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }

        .form-input::placeholder {
            color: var(--text-muted);
        }

        .form-textarea {
            resize: vertical;
            min-height: 80px;
            line-height: 1.5;
        }

        .form-textarea.large {
            min-height: 120px;
        }

        .form-help {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 5px;
        }

        .form-buttons {
            display: flex;
            gap: 12px;
            margin-top: auto;
            padding-top: 24px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), #4f46e5);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            font-family: var(--font-sans);
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(99, 102, 241, 0.25);
        }

        .btn-primary:hover {
            box-shadow: 0 4px 16px rgba(99, 102, 241, 0.4);
            transform: translateY(-1px);
        }

        .btn-primary:disabled {
            background: var(--border);
            color: var(--text-muted);
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        .btn-secondary {
            background: var(--bg-card);
            color: var(--text-dim);
            border: 1px solid var(--border);
            padding: 12px 24px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            font-family: var(--font-sans);
            transition: all 0.2s;
        }

        .btn-secondary:hover {
            border-color: var(--accent);
            color: var(--text);
        }

        /* ═══════════════════════════════════════════════════════════════
           ERROR TOAST
           ═══════════════════════════════════════════════════════════════ */
        .error {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--bg-card);
            border: 1px solid var(--rose);
            color: var(--rose);
            padding: 12px 20px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 500;
            box-shadow: 0 4px 20px rgba(251, 113, 133, 0.2);
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateX(20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .loading {
            text-align: center;
            padding: 24px;
            color: var(--text-muted);
            font-size: 13px;
        }

        /* ═══════════════════════════════════════════════════════════════
           RESPONSIVE
           ═══════════════════════════════════════════════════════════════ */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                height: 220px;
            }
            .main-content {
                height: calc(100vh - 220px);
            }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-brand">
                <svg viewBox="-3 -1 43 61" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12.2466 6.84654C10.7079 6.39062 9.09101 7.26833 8.63509 8.80703C8.17917 10.3457 9.0569 11.9626 10.5956 12.4186L29.5975 17.7971C30.8697 18.1741 31.0125 19.9187 29.8187 20.4976L4.09608 32.9688C-1.88237 35.8674 -1.15437 44.6071 5.22122 46.4766L23.8612 51.9425L23.9335 51.9626C25.4514 52.3663 27.0228 51.4877 27.4674 49.9718C27.9189 48.4318 27.0365 46.8172 25.4965 46.3656L6.85654 40.8998C5.58141 40.5259 5.43577 38.7779 6.63144 38.1982L32.354 25.727C38.3234 22.8328 37.6092 14.1096 31.2486 12.225L12.2466 6.84654Z" fill="#989898"/>
                    <path d="M32.6228 0.324673C34.1639 -0.123088 35.7763 0.763256 36.2241 2.30435C36.6718 3.84545 35.7855 5.45781 34.2444 5.90557L8.95895 13.2521C5.12457 14.3662 4.68188 19.6209 8.27578 21.3609L30.3814 32.0626C38.7567 36.1173 37.7398 48.3593 28.8103 50.9765L3.82665 58.299C2.2866 58.7504 0.672252 57.8678 0.220871 56.3278C-0.230493 54.7878 0.65202 53.1734 2.19206 52.722L27.1757 45.3995C31.0026 44.2778 31.4384 39.0312 27.849 37.2935L5.74338 26.5918C-2.64246 22.532 -1.60939 10.2708 7.33752 7.67133L32.6228 0.324673Z" fill="#00FF77"/>
                </svg>
                <h1>Strands Agents</h1>
            </div>
            <div class="header-controls">
                <button class="btn-icon" onclick="loadAgents()" title="Refresh agents">
                    ↻ Refresh
                </button>
            </div>
            <div class="filter-controls">
                <label class="filter-checkbox">
                    <input type="checkbox" id="show-all-agents" onchange="toggleShowAllAgents()">
                    Show all agents (including old)
                </label>
            </div>
        </div>
        <div class="sidebar-actions">
            <button class="new-agent-btn" onclick="showNewAgentForm()">New Agent</button>
            <button class="inbox-btn" id="inbox-btn" onclick="showInbox()">
                📥 Inbox <span class="unread-count" id="unread-count" style="display: none;">0</span>
            </button>
        </div>
        <div class="agents-list" id="agents-list">
            <div class="loading">Loading agents...</div>
        </div>
    </div>
    
    <div class="main-content">
        <div id="inbox-view" class="inbox-view">
            <div class="inbox-header">
                <h2>📥 Inbox</h2>
                <button class="btn-icon" onclick="loadInbox()">↻ Refresh</button>
            </div>
            <div class="inbox-content" id="inbox-content">
                <div class="loading">Loading inbox...</div>
            </div>
        </div>
        
        <div id="no-agent" class="no-agent" style="display: none;">
            <div class="no-agent-icon">🧬</div>
            <div class="no-agent-text">Select an agent to start chatting</div>
        </div>
        
        <div id="chat-container" class="chat-container" style="display: none;">
            <div class="chat-header">
                <h2 id="chat-title">Agent Chat</h2>
            </div>
            
            <div class="messages-area" id="messages-area">
                <div class="loading">Loading messages...</div>
            </div>
            
            <div class="input-area">
                <div class="input-row">
                    <textarea 
                        id="message-input" 
                        class="message-input" 
                        placeholder="Type your message..."
                        onkeydown="handleKeyDown(event)"
                    ></textarea>
                    <button class="send-btn" onclick="sendMessage()" id="send-btn">Send</button>
                </div>
                
                <div class="options-row">
                    <input 
                        type="text" 
                        id="aws-profile" 
                        class="option-input" 
                        placeholder="AWS Profile (optional)"
                    />
                    <input 
                        type="text" 
                        id="aws-region" 
                        class="option-input" 
                        placeholder="AWS Region (optional)"
                    />
                    <input 
                        type="text" 
                        id="system-prompt" 
                        class="option-input" 
                        placeholder="System Prompt (new agents only)"
                    />
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentAgentId = null;
        let refreshInterval = null;
        let messagesInterval = null;
        let allAgents = [];
        let inboxItems = [];
        let lastMessagesHash = null;
        let lastAgentsHash = null;
        let lastInboxHash = null;
        
        // Show inbox view
        function showInbox() {
            currentAgentId = null;
            lastMessagesHash = null;
            
            const newAgentForm = document.getElementById('new-agent-form');
            if (newAgentForm) newAgentForm.remove();
            
            document.getElementById('inbox-view').style.display = 'flex';
            document.getElementById('no-agent').style.display = 'none';
            document.getElementById('chat-container').style.display = 'none';
            
            document.getElementById('inbox-btn').classList.add('active');
            renderAgents(getFilteredAndSortedAgents());
            loadInbox(true);
        }
        
        // Auto-refresh every 3 seconds
        function startAutoRefresh() {
            refreshInterval = setInterval(() => {
                loadAgents();
                const inboxView = document.getElementById('inbox-view');
                if (inboxView && inboxView.style.display !== 'none') {
                    loadInbox();
                } else {
                    loadInboxData();
                }
                if (currentAgentId) {
                    loadMessages(currentAgentId);
                }
            }, 3000);
        }
        
        function stopAutoRefresh() {
            if (refreshInterval) { clearInterval(refreshInterval); refreshInterval = null; }
            if (messagesInterval) { clearInterval(messagesInterval); messagesInterval = null; }
        }
        
        function simpleHash(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                const char = str.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return hash;
        }
        
        async function loadInboxData() {
            try {
                const response = await fetch('/inbox');
                const data = await response.json();
                if (data.status === 'success') {
                    inboxItems = data.items;
                    updateUnreadCount();
                }
            } catch (error) { console.error('Error loading inbox data:', error); }
        }
        
        async function loadInbox(forceRender = false) {
            try {
                const response = await fetch('/inbox');
                const data = await response.json();
                if (data.status === 'success') {
                    const newHash = simpleHash(JSON.stringify(data.items));
                    if (forceRender || newHash !== lastInboxHash) {
                        inboxItems = data.items;
                        lastInboxHash = newHash;
                        renderInbox(inboxItems);
                    }
                    updateUnreadCount();
                } else { showError('Failed to load inbox'); }
            } catch (error) { showError('Error loading inbox: ' + error.message); }
        }
        
        function renderInbox(items) {
            const inboxContent = document.getElementById('inbox-content');
            if (items.length === 0) {
                inboxContent.innerHTML = `
                    <div class="inbox-empty">
                        <div class="inbox-empty-icon">📭</div>
                        <div style="font-size: 16px; font-weight: 500;">No agent responses yet</div>
                        <div style="font-size: 12px; margin-top: 8px; color: var(--text-muted);">Create an agent to get started</div>
                    </div>`;
                return;
            }
            const itemsWithResponses = items.filter(item => item.last_response_preview);
            if (itemsWithResponses.length === 0) {
                inboxContent.innerHTML = `
                    <div class="inbox-empty">
                        <div class="inbox-empty-icon">📭</div>
                        <div style="font-size: 16px; font-weight: 500;">No agent responses yet</div>
                        <div style="font-size: 12px; margin-top: 8px; color: var(--text-muted);">Send a message to an agent to see responses here</div>
                    </div>`;
                return;
            }
            inboxContent.innerHTML = itemsWithResponses.map(item => {
                const timeText = formatLastActivity(item.last_activity);
                const isUnread = item.has_unread;
                const statusBadge = item.processing ? '<span class="status-badge status-processing">Processing</span>' : '';
                return `
                    <div class="inbox-item ${isUnread ? 'unread' : ''}" onclick="selectAgent('${item.agent_id}')">
                        <div class="inbox-item-header">
                            <div class="inbox-item-agent">
                                ${isUnread ? '<span class="unread-dot"></span>' : ''}
                                ${escapeHtml(item.agent_id)}
                                ${statusBadge}
                            </div>
                            <div class="inbox-item-time">${timeText}</div>
                        </div>
                        <div class="inbox-item-preview">${escapeHtml(item.last_response_preview || 'No response yet')}</div>
                    </div>`;
            }).join('');
        }
        
        function updateUnreadCount() {
            const unreadCount = inboxItems.filter(item => item.has_unread && item.last_response_preview).length;
            const badge = document.getElementById('unread-count');
            if (unreadCount > 0) {
                badge.textContent = unreadCount;
                badge.style.display = 'inline-block';
            } else { badge.style.display = 'none'; }
        }
        
        async function loadAgents() {
            try {
                const response = await fetch('/agents');
                const data = await response.json();
                if (data.status === 'success') {
                    const newHash = simpleHash(JSON.stringify(data.agents));
                    if (newHash !== lastAgentsHash) {
                        allAgents = data.agents;
                        lastAgentsHash = newHash;
                        renderAgents(getFilteredAndSortedAgents());
                    }
                } else { showError('Failed to load agents'); }
            } catch (error) { showError('Error loading agents: ' + error.message); }
        }
        
        function getFilteredAndSortedAgents() {
            const showAll = document.getElementById('show-all-agents').checked;
            let agents = [...allAgents];
            if (!showAll) {
                const sevenDaysAgo = new Date();
                sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);
                agents = agents.filter(agent => {
                    if (!agent.last_activity) {
                        if (!agent.created_at) return true;
                        return new Date(agent.created_at) > sevenDaysAgo;
                    }
                    return new Date(agent.last_activity) > sevenDaysAgo;
                });
            }
            agents.sort((a, b) => {
                const aTime = a.last_activity ? new Date(a.last_activity) : a.created_at ? new Date(a.created_at) : new Date(0);
                const bTime = b.last_activity ? new Date(b.last_activity) : b.created_at ? new Date(b.created_at) : new Date(0);
                return bTime - aTime;
            });
            return agents;
        }
        
        function toggleShowAllAgents() { renderAgents(getFilteredAndSortedAgents()); }
        
        function renderAgents(agents) {
            const agentsList = document.getElementById('agents-list');
            if (agents.length === 0) {
                const showAll = document.getElementById('show-all-agents').checked;
                const message = showAll ? 'No agents found' : 'No recent agents';
                agentsList.innerHTML = `<div class="loading">${message}</div>`;
                return;
            }
            agentsList.innerHTML = agents.map(agent => {
                const lastActivityText = formatLastActivity(agent.last_activity || agent.created_at);
                const dataDir = agent.data_dir || 'N/A';
                const port = agent.port || 'N/A';
                const description = agent.description || '';
                return `
                    <div class="agent-item ${agent.agent_id === currentAgentId ? 'active' : ''}" 
                         onclick="selectAgent('${agent.agent_id}')">
                        <div class="agent-id">${agent.agent_id}</div>
                        ${description ? `<div class="agent-description">${escapeHtml(description)}</div>` : ''}
                        <div class="agent-status">
                            <span class="status-badge status-${agent.status}">${agent.status}</span>
                            ${agent.processing ? '<span class="status-badge status-processing">Processing</span>' : ''}
                            <span style="color: var(--text-muted); font-size: 10px; font-family: var(--font-mono);">${lastActivityText}</span>
                        </div>
                        <div class="agent-meta">
                            <div class="agent-meta-row"><span>Port: ${port}</span></div>
                            <div class="agent-meta-row">
                                <span style="flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;" title="${escapeHtml(dataDir)}">
                                    ${escapeHtml(dataDir)}
                                </span>
                            </div>
                            <div class="agent-meta-row">
                                <button class="copy-btn" onclick="copyPath(event, '${escapeHtml(dataDir)}')" title="Copy path">
                                    📋 Copy path
                                </button>
                            </div>
                        </div>
                    </div>`;
            }).join('');
        }
        
        function formatLastActivity(dateString) {
            if (!dateString) return 'Unknown';
            const date = new Date(dateString);
            const now = new Date();
            const diffMs = now - date;
            const diffMins = Math.floor(diffMs / (1000 * 60));
            const diffHours = Math.floor(diffMs / (1000 * 60 * 60));
            const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
            if (diffMins < 1) return 'Just now';
            if (diffMins < 60) return `${diffMins}m ago`;
            if (diffHours < 24) return `${diffHours}h ago`;
            if (diffDays < 7) return `${diffDays}d ago`;
            return date.toLocaleDateString();
        }
        
        async function selectAgent(agentId) {
            currentAgentId = agentId;
            lastMessagesHash = null;
            const newAgentForm = document.getElementById('new-agent-form');
            if (newAgentForm) newAgentForm.remove();
            
            document.getElementById('inbox-view').style.display = 'none';
            document.getElementById('no-agent').style.display = 'none';
            document.getElementById('chat-container').style.display = 'flex';
            document.getElementById('chat-title').textContent = agentId;
            document.getElementById('inbox-btn').classList.remove('active');
            renderAgents(getFilteredAndSortedAgents());
            await loadMessages(agentId, true);
        }
        
        async function loadMessages(agentId, forceRender = false) {
            try {
                const response = await fetch(`/agents/${agentId}/messages?count=20`);
                const data = await response.json();
                if (agentId !== currentAgentId) return;
                if (data.status === 'success') {
                    const newHash = simpleHash(JSON.stringify(data.messages));
                    if (forceRender || newHash !== lastMessagesHash) {
                        lastMessagesHash = newHash;
                        renderMessages(data.messages);
                    }
                } else if (response.status === 404) {
                    if (forceRender || lastMessagesHash !== 'empty') {
                        lastMessagesHash = 'empty';
                        renderMessages([]);
                    }
                } else { showError('Failed to load messages'); }
            } catch (error) { showError('Error loading messages: ' + error.message); }
        }
        
        function renderMessages(messages) {
            const messagesArea = document.getElementById('messages-area');
            const wasNearBottom = messagesArea.scrollHeight - messagesArea.scrollTop - messagesArea.clientHeight < 100;
            if (messages.length === 0) {
                messagesArea.innerHTML = '<div class="loading">No messages yet. Send a message to start the conversation.</div>';
                return;
            }
            const displayMessages = [];
            for (const msg of messages) {
                const content = msg.content || [];
                if (msg.role === 'user') {
                    const toolResult = Array.isArray(content) && content.find(c => c.type === 'tool_result' || c.toolResult);
                    if (toolResult) {
                        const result = toolResult.toolResult || toolResult;
                        const status = result.status || (result.is_error ? 'error' : 'success');
                        displayMessages.push({ type: 'tool_result', status });
                    } else {
                        const text = extractText(content);
                        if (text) displayMessages.push({ type: 'user', content: text });
                    }
                } else if (msg.role === 'assistant') {
                    if (Array.isArray(content)) {
                        let text = '';
                        for (const item of content) {
                            if (item.type === 'text' || item.text) {
                                text += (item.text || '') + '\n';
                            } else if (item.type === 'tool_use' || item.toolUse) {
                                if (text.trim()) {
                                    displayMessages.push({ type: 'assistant', content: text.trim() });
                                    text = '';
                                }
                                const toolData = item.toolUse || item;
                                displayMessages.push({ type: 'tool_use', tool: toolData.name || 'unknown', input: toolData.input || null });
                            }
                        }
                        if (text.trim()) displayMessages.push({ type: 'assistant', content: text.trim() });
                    } else if (typeof content === 'string') {
                        displayMessages.push({ type: 'assistant', content });
                    }
                }
            }
            messagesArea.innerHTML = displayMessages.map(msg => {
                if (msg.type === 'tool_use') {
                    const inputStr = msg.input ? formatToolInput(msg.input) : '';
                    return `
                        <div class="message tool_use">
                            <div class="message-content">
                                <span class="tool-icon">⚙️</span>
                                <span class="tool-badge tool-name">${escapeHtml(msg.tool)}</span>
                                ${inputStr ? `<span class="tool-params">${escapeHtml(inputStr)}</span>` : ''}
                            </div>
                        </div>`;
                } else if (msg.type === 'tool_result') {
                    const statusClass = msg.status === 'success' ? 'status-success' : msg.status === 'error' ? 'status-error' : 'status-unknown';
                    const icon = msg.status === 'success' ? '✓' : msg.status === 'error' ? '✗' : '?';
                    return `
                        <div class="message tool_result">
                            <div class="message-content">
                                <span class="tool-icon" style="margin-left: 22px;">↳</span>
                                <span class="tool-badge ${statusClass}">${icon}</span>
                            </div>
                        </div>`;
                } else {
                    return `
                        <div class="message ${msg.type}">
                            <div class="message-header">${msg.type.toUpperCase()}</div>
                            <div class="message-content">${escapeHtml(msg.content || '')}</div>
                        </div>`;
                }
            }).join('');
            if (wasNearBottom) messagesArea.scrollTop = messagesArea.scrollHeight;
        }
        
        function formatToolInput(input) {
            if (!input) return '';
            if (typeof input === 'string') return input;
            const parts = [];
            for (const [key, value] of Object.entries(input)) {
                let valStr = typeof value === 'string' ? value : JSON.stringify(value);
                if (valStr.length > 50) valStr = valStr.substring(0, 47) + '...';
                parts.push(`${key}=${valStr}`);
            }
            return parts.join(', ');
        }
        
        function extractText(content) {
            if (typeof content === 'string') return content;
            if (!Array.isArray(content)) return '';
            return content.filter(c => c.type === 'text' || c.text).map(c => c.text || '').join('\n');
        }
        
        async function sendMessage() {
            if (!currentAgentId) return;
            const messageInput = document.getElementById('message-input');
            const sendBtn = document.getElementById('send-btn');
            const message = messageInput.value.trim();
            if (!message) return;
            const awsProfile = document.getElementById('aws-profile').value.trim() || null;
            const awsRegion = document.getElementById('aws-region').value.trim() || null;
            const systemPrompt = document.getElementById('system-prompt').value.trim() || null;
            messageInput.disabled = true;
            sendBtn.disabled = true;
            sendBtn.textContent = 'Sending...';
            try {
                const response = await fetch(`/agents/${currentAgentId}/message`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, aws_profile: awsProfile, aws_region: awsRegion, system_prompt: systemPrompt })
                });
                const data = await response.json();
                if (data.status === 'dispatched' || data.status === 'queued') {
                    messageInput.value = '';
                    addMessageToUI('user', message);
                    pollForResponse();
                } else { showError(data.error || 'Failed to send message'); }
            } catch (error) { showError('Error sending message: ' + error.message); }
            finally {
                messageInput.disabled = false;
                sendBtn.disabled = false;
                sendBtn.textContent = 'Send';
                messageInput.focus();
            }
        }
        
        function addMessageToUI(role, content) {
            const messagesArea = document.getElementById('messages-area');
            if (messagesArea.innerHTML.includes('No messages yet')) messagesArea.innerHTML = '';
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            messageDiv.innerHTML = `
                <div class="message-header">${role.toUpperCase()}</div>
                <div class="message-content">${escapeHtml(content)}</div>`;
            messagesArea.appendChild(messageDiv);
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }
        
        function pollForResponse() {
            let attempts = 0;
            const maxAttempts = 40;
            const poll = async () => {
                attempts++;
                try {
                    const response = await fetch(`/agents/${currentAgentId}/messages?count=1`);
                    const data = await response.json();
                    if (data.status === 'success' && data.messages.length > 0) {
                        const lastMessage = data.messages[data.messages.length - 1];
                        const messagesArea = document.getElementById('messages-area');
                        const lastDisplayed = messagesArea.querySelector('.message:last-child .message-header');
                        if (lastMessage.role === 'assistant' && (!lastDisplayed || !lastDisplayed.textContent.includes('ASSISTANT'))) {
                            lastMessagesHash = null;
                            loadMessages(currentAgentId, true);
                            return;
                        }
                    }
                    if (!data.processing && attempts < maxAttempts) { setTimeout(poll, 3000); }
                    else if (attempts >= maxAttempts) { showError('Response timeout.'); }
                    else { setTimeout(poll, 3000); }
                } catch (error) {
                    console.error('Error polling:', error);
                    if (attempts < maxAttempts) setTimeout(poll, 3000);
                }
            };
            setTimeout(poll, 1000);
        }
        
        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }
        
        function showError(message) {
            const error = document.createElement('div');
            error.className = 'error';
            error.textContent = message;
            document.body.appendChild(error);
            setTimeout(() => error.remove(), 5000);
        }
        
        function showNewAgentForm() {
            document.getElementById('inbox-view').style.display = 'none';
            document.getElementById('no-agent').style.display = 'none';
            document.getElementById('chat-container').style.display = 'none';
            document.getElementById('inbox-btn').classList.remove('active');
            const existingForm = document.getElementById('new-agent-form');
            if (existingForm) existingForm.remove();
            const formHtml = `
                <div id="new-agent-form" class="new-agent-form">
                    <div class="form-header">
                        <h2>Create New Agent</h2>
                        <p>Configure and launch a new AI agent in an isolated Docker container with its own workspace, tools, and MCP servers.</p>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Agent ID *</label>
                        <input type="text" id="new-agent-id" class="form-input" 
                               placeholder="e.g., code-reviewer, data-analyst, my-helper"
                               pattern="[a-z0-9-]+" />
                        <div class="form-help">Lowercase letters, numbers, and hyphens only.</div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Description</label>
                        <input type="text" id="new-agent-description" class="form-input" 
                               placeholder="e.g., Reviews Python code for best practices" />
                    </div>
                    <div class="form-group">
                        <label class="form-label">System Prompt</label>
                        <textarea id="new-agent-system-prompt" class="form-input form-textarea large"
                                  placeholder="You are a helpful assistant specialized in..."></textarea>
                        <div class="form-help">Define the agent's expertise and behavior. Leave empty for default.</div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Initial Message *</label>
                        <textarea id="new-agent-message" class="form-input form-textarea"
                                  placeholder="Hello! Please help me with..."></textarea>
                    </div>
                    <div style="display: flex; gap: 16px;">
                        <div class="form-group" style="flex: 1;">
                            <label class="form-label">AWS Profile</label>
                            <input type="text" id="new-agent-aws-profile" class="form-input" placeholder="default" />
                        </div>
                        <div class="form-group" style="flex: 1;">
                            <label class="form-label">AWS Region</label>
                            <input type="text" id="new-agent-aws-region" class="form-input" placeholder="us-east-1" />
                        </div>
                    </div>
                    <div class="form-buttons">
                        <button class="btn-secondary" onclick="cancelNewAgent()">Cancel</button>
                        <button class="btn-primary" id="create-agent-btn" onclick="createNewAgent()">Create Agent</button>
                    </div>
                </div>`;
            document.querySelector('.main-content').insertAdjacentHTML('beforeend', formHtml);
            setTimeout(() => document.getElementById('new-agent-id').focus(), 100);
            currentAgentId = null;
            renderAgents(getFilteredAndSortedAgents());
        }
        
        function cancelNewAgent() {
            const form = document.getElementById('new-agent-form');
            if (form) form.remove();
            showInbox();
        }
        
        async function createNewAgent() {
            const agentId = document.getElementById('new-agent-id').value.trim();
            const description = document.getElementById('new-agent-description').value.trim() || null;
            const systemPrompt = document.getElementById('new-agent-system-prompt').value.trim() || null;
            const message = document.getElementById('new-agent-message').value.trim();
            const awsProfile = document.getElementById('new-agent-aws-profile').value.trim() || null;
            const awsRegion = document.getElementById('new-agent-aws-region').value.trim() || null;
            if (!agentId) { showError('Agent ID is required'); return; }
            if (!/^[a-z0-9-]+$/.test(agentId)) { showError('Agent ID: lowercase letters, numbers, hyphens only'); return; }
            if (!message) { showError('Initial message is required'); return; }
            if (allAgents.some(a => a.agent_id === agentId)) { showError(`Agent "${agentId}" already exists`); return; }
            const btn = document.getElementById('create-agent-btn');
            btn.disabled = true;
            btn.textContent = 'Creating...';
            try {
                const response = await fetch(`/agents/${agentId}/message`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, aws_profile: awsProfile, aws_region: awsRegion, system_prompt: systemPrompt, description })
                });
                const data = await response.json();
                if (data.status === 'dispatched' || data.status === 'queued') {
                    const form = document.getElementById('new-agent-form');
                    if (form) form.remove();
                    await loadAgents();
                    await selectAgent(agentId);
                    addMessageToUI('user', message);
                    pollForResponse();
                } else {
                    showError(data.error || 'Failed to create agent');
                    btn.disabled = false;
                    btn.textContent = 'Create Agent';
                }
            } catch (error) {
                showError('Error creating agent: ' + error.message);
                btn.disabled = false;
                btn.textContent = 'Create Agent';
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function copyPath(event, dataDir) {
            event.stopPropagation();
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(dataDir).then(() => {
                    const btn = event.target.closest('.copy-btn');
                    const originalText = btn.innerHTML;
                    btn.classList.add('copied');
                    btn.innerHTML = '✓ Copied!';
                    setTimeout(() => { btn.classList.remove('copied'); btn.innerHTML = originalText; }, 2000);
                }).catch(err => showError('Failed to copy'));
            }
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadAgents();
            loadInbox();
            document.getElementById('inbox-btn').classList.add('active');
            startAutoRefresh();
        });
        
        window.addEventListener('beforeunload', () => stopAutoRefresh());
    </script>
</body>
</html>
